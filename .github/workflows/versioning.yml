name: Versioning

on:
  pull_request:
  push:
    branches:
      - Develop
      - main
  workflow_dispatch:

jobs:
  build-metadata:
    name: Generate Build Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build metadata
        run: npm run build:metadata -- --out=artifacts/build-info.json

      - name: Upload build metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: artifacts/build-info.json
